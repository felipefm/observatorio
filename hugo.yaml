baseURL: 'https://observatorio.felipefm.com/'
languageCode: 'pt-br'
title: 'O Observatório'
theme: 'PaperMod'

# Aqui ligamos o "motor" gerador do índice de busca
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  comments: true
  disableSpecial1stPost: true

menu:
  main:
    - identifier: search
      name: "Pesquisar"
      url: /search/
      weight: 5
    - identifier: archives
      name: "Arquivo"
      url: /archives/
      weight: 10
    - identifier: sobre
      name: "Sobre"
      url: /sobre/
      weight: 20

markup:
  goldmark:
    renderer:
      hardWraps: true
